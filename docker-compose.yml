version: '3.1'
services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: academy
      POSTGRES_PASSWORD: academy
      POSTGRES_DB: electricity
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 5432:5432
    networks:
      - electricity-net
  adminer:
    image: adminer
    restart: always
    ports:
      - 8088:8080
    networks:
      - electricity-net

  backend:
    build: ./backend
    container_name: fastapi-backend
    restart: always
    environment: 
      - DATABASE_URL=postgresql://academy:academy@db:5432/electricity
    ports:
      - 8000:8000
    depends_on:
      - db
    networks:
      - electricity-net

  frontend:
    build: ./frontend
    container_name: streamlit-frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - 8501:8501
    depends_on:
      - backend
    networks:
      - electricity-net

networks:
  electricity-net:
    driver: bridge